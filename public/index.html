<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프리미엄 캘린더 & 채팅</title>
    <meta name="description" content="친구들과 실시간으로 일정을 공유하고 채팅하는 프리미엄 캘린더 앱">
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#8b7355">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="공유 캘린더">
    <link rel="apple-touch-icon" href="/icon-192.png">
</head>
<body class="light-mode">
    <div class="bg-image"></div>

    <!-- 풀스크린 인트로 -->
    <div id="intro-screen" class="intro-screen">
        <div class="intro-content">
            <div class="intro-icon">📅</div>
            <h1 class="intro-title">공유 캘린더</h1>
            <p class="intro-sub">친구들과 함께하는 우리만의 일정</p>
            <div class="intro-dots">
                <span></span><span></span><span></span>
            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <!-- 이미지 크게 보기 모달 -->
    <div id="image-modal" class="overlay hidden" style="z-index: 3000;">
        <span id="close-image-modal" style="position:absolute; top:20px; right:30px; font-size:40px; color:white; cursor:pointer; font-weight:bold;">&times;</span>
        <img id="modal-image" style="max-width:90%; max-height:90%; border-radius:10px; box-shadow: 0 10px 50px rgba(0,0,0,0.8);" src="" alt="확대 이미지">
    </div>

    <!-- 일정 상세 보기 모달 -->
    <div id="event-detail-modal" class="overlay hidden" style="z-index: 3000;">
        <div class="glass-panel" style="padding: 2rem; width: 350px; max-width: 90%; color: var(--text-main); position: relative;">
            <span id="close-event-detail" style="position:absolute; top:15px; right:20px; font-size:24px; cursor:pointer; opacity:0.7;">&times;</span>
            <div id="detail-event-date" style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 5px; font-weight:600;"></div>
            <h2 id="detail-event-title" style="margin-bottom: 1.5rem; word-break: break-all; font-size: 1.2rem; line-height:1.4;"></h2>
            <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 2rem;">
                <div id="detail-event-color" style="width: 15px; height: 15px; border-radius: 50%;"></div>
                <span id="detail-event-author" style="font-size: 0.95rem; font-weight:700;"></span>
            </div>
            <div style="display: flex; gap: 10px; justify-content: flex-end;">
                <button id="detail-edit-btn" class="btn" style="width: auto; padding: 0.5rem 1.2rem;">수정하기</button>
                <button id="detail-del-btn" class="btn-outline" style="width: auto; padding: 0.5rem 1.2rem; color: #d94a4a; border-color: #d94a4a;">삭제</button>
            </div>
        </div>
    </div>

    <div id="login-overlay" class="overlay hidden">
        <div class="login-box glass-panel">
            <h2>환영합니다!</h2>
            <p>프로필을 설정해주세요.</p>
            <input type="text" id="username-input" placeholder="이름 (예: 민재)" autocomplete="off" maxlength="10">
            <div class="avatar-picker" style="display: flex; gap: 10px; justify-content: center; margin-bottom: 1rem; font-size: 1.5rem;">
                <div class="avatar-option selected" data-avatar="☕" style="cursor:pointer; opacity:1; transform:scale(1.2);">☕</div>
                <div class="avatar-option" data-avatar="🥐" style="cursor:pointer; opacity:0.5;">🥐</div>
                <div class="avatar-option" data-avatar="🐱" style="cursor:pointer; opacity:0.5;">🐱</div>
                <div class="avatar-option" data-avatar="🐶" style="cursor:pointer; opacity:0.5;">🐶</div>
                <div class="avatar-option" data-avatar="🐰" style="cursor:pointer; opacity:0.5;">🐰</div>
            </div>
            <div class="color-picker">
                <div class="color-option selected" style="background: #ff6b6b;" data-color="#ff6b6b"></div>
                <div class="color-option" style="background: #4ecdc4;" data-color="#4ecdc4"></div>
                <div class="color-option" style="background: #ffe66d;" data-color="#ffe66d"></div>
                <div class="color-option" style="background: #43aa8b;" data-color="#43aa8b"></div>
                <div class="color-option" style="background: #c77dff;" data-color="#c77dff"></div>
                <div class="color-option" style="background: #ff9f1c;" data-color="#ff9f1c"></div>
            </div>
            <button id="join-btn" class="btn">입장하기</button>
        </div>
    </div>

    <div class="app-container">
        <!-- 메인 달력 -->
        <main class="calendar-section glass-panel">
            <header class="cal-header">
                <button id="prev-month" class="icon-btn">&lt;</button>
                <h2 id="month-display">2026년 5월</h2>
                <div style="display:flex; gap:10px;">
                    <button id="view-toggle" class="icon-btn" title="주간/월간 전환">📅</button>
                    <button id="next-month" class="icon-btn">&gt;</button>
                    <button id="theme-toggle" class="icon-btn theme-toggle" title="다크 모드 변경">🌙</button>
                </div>
            </header>
            
            <!-- 일정 검색 -->
            <div class="search-bar">
                <input type="text" id="event-search" placeholder="🔍 일정 검색..." autocomplete="off">
                <div id="search-results" class="search-results hidden"></div>
            </div>
            
            <div class="weekdays">
                <div class="sunday">일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div class="saturday">토</div>
            </div>
            
            <div id="calendar-grid" class="calendar-grid"></div>
        </main>

        <!-- 우측 사이드바 -->
        <aside class="sidebar-section">
            
            <!-- 다가오는 디데이 배너 -->
            <div id="dday-banner" class="dday-banner glass-panel hidden">
                <div class="dday-icon">🎯</div>
                <div class="dday-info">
                    <div id="dday-title" class="dday-title">가장 가까운 일정</div>
                    <div id="dday-count" class="dday-count">D-Day</div>
                </div>
            </div>

            <!-- 내 프로필 & 접속자 -->
            <div class="user-info glass-panel">
                <div class="my-profile-header">
                    <div id="my-color-badge" class="color-badge" style="display:flex; justify-content:center; align-items:center; font-size:0.8rem;"><span id="my-avatar-display"></span></div>
                    <span id="my-username-display">로딩중...</span>
                    <button id="logout-btn" class="btn-small">이름 변경</button>
                </div>
                <div class="online-users-section">
                    <span class="online-title">🟢 접속 중인 친구들</span>
                    <div id="active-users-container" class="active-users-list"></div>
                </div>
            </div>

            <!-- 일정 폼 -->
            <div class="add-event-box glass-panel">
                <h3 id="event-form-title">새로운 일정 공유</h3>
                <input type="hidden" id="edit-event-id">
                <div class="date-inputs">
                    <input type="date" id="event-date" title="시작일">
                    <span id="date-tilde" style="align-self: center; font-weight: bold;">~</span>
                    <input type="date" id="event-end-date" title="종료일">
                </div>
                <input type="text" id="event-title" placeholder="어떤 일정인가요?" autocomplete="off">
                <div class="category-selector" id="category-selector">
                    <span class="cat-option selected" data-cat="">없음</span>
                    <span class="cat-option" data-cat="✈️">✈️여행</span>
                    <span class="cat-option" data-cat="🍻">🍻모임</span>
                    <span class="cat-option" data-cat="🎂">🎂생일</span>
                    <span class="cat-option" data-cat="💼">💼업무</span>
                    <span class="cat-option" data-cat="🏃">🏃운동</span>
                </div>
                <label class="dday-checkbox">
                    <input type="checkbox" id="event-is-dday"> 🎯 중요 D-Day로 고정하기
                </label>
                <div class="repeat-selector">
                    <label style="font-size:0.85rem; font-weight:600;">🔁 반복</label>
                    <select id="event-repeat">
                        <option value="none">없음</option>
                        <option value="weekly">매주</option>
                        <option value="biweekly">2주마다</option>
                        <option value="monthly">매월</option>
                    </select>
                    <select id="event-repeat-count">
                        <option value="4">4회</option>
                        <option value="8">8회</option>
                        <option value="12">12회</option>
                    </select>
                </div>
                <div class="event-form-actions">
                    <button id="add-event-btn" class="btn">일정 추가</button>
                    <button id="cancel-edit-btn" class="btn-outline hidden">취소</button>
                </div>
            </div>

            <!-- 다가오는 일정 목록 -->
            <div class="upcoming-panel glass-panel">
                <div class="upcoming-header">
                    <h3>📋 다가오는 일정</h3>
                </div>
                <div id="upcoming-list" class="upcoming-list">
                    <p class="no-events">일정이 없습니다</p>
                </div>
            </div>

        </aside>
    </div>

    <!-- 날짜 툴팁 -->
    <div id="day-tooltip" class="day-tooltip"></div>

    <!-- 플로팅 채팅 버튼 -->
    <button id="chat-fab" class="chat-fab">
        💬
        <span id="unread-badge" class="unread-badge hidden">0</span>
    </button>

    <!-- 플로팅 채팅 패널 -->
    <div id="chat-panel" class="chat-panel hidden">
        <div class="chat-container glass-panel">
            <div class="chat-header">
                <h3>실시간 소통방 💬</h3>
                <button id="chat-close" class="chat-close-btn">&times;</button>
            </div>
            <div id="chat-messages" class="chat-messages"></div>
            
            <!-- 고정 메시지 -->
            <div id="pinned-bar" class="pinned-bar hidden">
                <span>📌</span>
                <span id="pinned-text" class="pinned-text"></span>
                <button id="unpin-btn" class="reply-cancel">&times;</button>
            </div>
            
            <!-- 입력 중 표시기 -->
            <div id="typing-indicator" class="typing-indicator hidden">누군가 입력 중...</div>
            
            <!-- 답장 미리보기 -->
            <div id="reply-preview" class="reply-preview hidden">
                <span id="reply-preview-text"></span>
                <button type="button" id="reply-cancel" class="reply-cancel">&times;</button>
            </div>
            
            <form id="chat-form" class="chat-form">
                <label for="chat-file-input" class="file-upload-btn" title="파일 전송">📎</label>
                <input type="file" id="chat-file-input" class="hidden">
                <div style="position:relative;">
                    <button type="button" id="emoji-btn" class="file-upload-btn" title="이모지">😊</button>
                    <div id="emoji-picker" class="emoji-picker hidden">
                        <span>😊</span><span>😂</span><span>❤️</span><span>👍</span><span>🔥</span><span>🎉</span>
                        <span>😍</span><span>🤣</span><span>😭</span><span>🥺</span><span>✨</span><span>💕</span>
                        <span>👏</span><span>🙏</span><span>💪</span><span>🤔</span><span>😎</span><span>🥳</span>
                    </div>
                </div>
                <input type="text" id="chat-input" placeholder="메시지 입력..." autocomplete="off">
                <button type="submit" class="btn-send">전송</button>
            </form>
        </div>
    </div>

    <!-- ========== 추억앨범 페이지 ========== -->
    <div id="page-album" class="page-section hidden">
        <div class="page-inner">
            <div class="page-header glass-panel">
                <h2>📸 추억앨범</h2>
                <label for="album-file-input" class="btn" style="width:auto;padding:0.55rem 1.2rem;cursor:pointer;">+ 사진 추가</label>
                <input type="file" id="album-file-input" accept="image/*" class="hidden">
            </div>
            <!-- 업로드 폼 (사진 선택 후 표시) -->
            <div id="album-upload-form" class="album-upload-form glass-panel hidden">
                <img id="album-preview-img" src="" alt="미리보기" class="album-preview-img">
                <input type="text" id="album-caption-input" placeholder="어떤 순간인가요? (캡션)" maxlength="60" autocomplete="off">
                <div style="display:flex;gap:8px;">
                    <button id="album-submit-btn" class="btn" style="flex:1;">올리기</button>
                    <button id="album-cancel-btn" class="btn-outline" style="width:auto;padding:0.8rem 1.2rem;">취소</button>
                </div>
            </div>
            <div id="album-grid" class="album-grid"></div>
        </div>
    </div>

    <!-- 앨범 라이트박스 -->
    <div id="album-lightbox" class="overlay hidden" style="z-index:3000;">
        <span id="album-lightbox-close" style="position:absolute;top:20px;right:30px;font-size:40px;color:white;cursor:pointer;font-weight:bold;">&times;</span>
        <div class="album-lightbox-content">
            <img id="album-lightbox-img" src="" alt="">
            <div id="album-lightbox-info" class="album-lightbox-info"></div>
        </div>
    </div>

    <!-- ========== 우리의 지도 페이지 ========== -->
    <div id="page-map" class="page-section hidden">
        <div id="map-container" style="width:100%;height:100%;"></div>
        <!-- 핀 추가 모달 -->
        <div id="map-pin-modal" class="map-pin-modal glass-panel hidden">
            <h3 style="margin:0 0 1rem;font-size:1rem;font-weight:800;">📍 장소 추가</h3>
            <input type="text" id="pin-name-input" placeholder="장소 이름" maxlength="30" autocomplete="off">
            <input type="text" id="pin-memo-input" placeholder="메모 (선택)" maxlength="60" autocomplete="off">
            <div class="pin-category-btns">
                <button class="pin-cat-btn active" data-cat="visited">🟢 가봤어요</button>
                <button class="pin-cat-btn" data-cat="wishlist">🟠 가고싶어요</button>
            </div>
            <div style="display:flex;gap:8px;margin-top:0.8rem;">
                <button id="pin-submit-btn" class="btn" style="flex:1;">핀 추가</button>
                <button id="pin-cancel-btn" class="btn-outline" style="width:auto;padding:0.8rem 1.2rem;">취소</button>
            </div>
        </div>
    </div>

    <!-- ========== 랜덤뽑기 페이지 ========== -->
    <div id="page-picker" class="page-section hidden">
        <div class="page-inner picker-layout">
            <div class="picker-input-area glass-panel">
                <h2 style="margin:0 0 1.2rem;font-size:1.1rem;font-weight:800;">🎲 랜덤뽑기</h2>
                <div style="display:flex;gap:8px;margin-bottom:1rem;">
                    <input type="text" id="picker-input" placeholder="항목 입력 후 Enter" maxlength="20" autocomplete="off" style="flex:1;">
                    <button id="picker-add-btn" class="btn" style="width:auto;padding:0.8rem 1rem;">추가</button>
                </div>
                <div id="picker-items" class="picker-items"></div>
                <button id="picker-spin-btn" class="picker-spin-btn">🎲 돌리기!</button>
            </div>
            <div class="picker-result-area">
                <div id="picker-roulette" class="picker-roulette">
                    <div id="picker-roulette-inner" class="picker-roulette-inner">
                        <span id="picker-roulette-text">?</span>
                    </div>
                </div>
                <div id="picker-result-display" class="picker-result-display hidden">
                    <div id="picker-result-text" class="picker-result-text"></div>
                </div>
                <div class="picker-history-area">
                    <p class="picker-history-label">최근 결과</p>
                    <div id="picker-history" class="picker-history"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- ========== 하단 네비게이션 ========== -->
    <nav class="bottom-nav" id="bottom-nav">
        <button class="nav-btn active" data-page="calendar">
            <span class="nav-icon">📅</span>
            <span class="nav-label">캘린더</span>
        </button>
        <button class="nav-btn" data-page="album">
            <span class="nav-icon">📸</span>
            <span class="nav-label">추억앨범</span>
        </button>
        <button class="nav-btn" data-page="map">
            <span class="nav-icon">🗺️</span>
            <span class="nav-label">우리지도</span>
        </button>
        <button class="nav-btn" data-page="picker">
            <span class="nav-icon">🎲</span>
            <span class="nav-label">랜덤뽑기</span>
        </button>
    </nav>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <script src="js/state.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/calendar.js"></script>
    <script src="js/events.js"></script>
    <script src="js/nav.js"></script>
    <script src="js/album.js"></script>
    <script src="js/map-page.js"></script>
    <script src="js/picker.js"></script>
    <script src="js/app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/service-worker.js')
                .then(reg => console.log('SW 등록:', reg.scope))
                .catch(err => console.warn('SW 등록 실패:', err));
        }
    </script>
</body>
</html>
